<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Greeter</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="greeting">Hello</h1>
        </header>
        <main>
            <div class="input-section">
                <input type="text" id="nameInput" placeholder="Enter your name" autocomplete="off">
                <button id="greetBtn">Greet Me</button>
            </div>
            <div class="color-grid">
                <div class="color-box" data-color="red">Red</div>
                <div class="color-box" data-color="blue">Blue</div>
                <div class="color-box" data-color="green">Green</div>
                <div class="color-box" data-color="yellow">Yellow</div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
